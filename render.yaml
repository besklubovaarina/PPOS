services:
  - type: web
    name: ppos-altgpu
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ppos-db
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: ppos-db
    databaseName: ppos
    user: ppos_user
    plan: free
